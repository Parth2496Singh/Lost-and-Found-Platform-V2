apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: lost-found-updater
  namespace: argocd
spec:
  applicationRefs:
    - namePattern: "lost-found-app"
      writeBackConfig:
        method: "git"
      images:
        - alias: "lost-found"
          imageName: "parthsingh2496/lost-found-ultra"